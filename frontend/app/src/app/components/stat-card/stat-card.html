<article class="stat-card" [class.stat-card--selected]="selected()">
  <div
    class="card-hitbox"
    role="button"
    tabindex="0"
    (click)="select.emit()"
    (keydown.enter)="select.emit()"
    (keydown.space)="select.emit(); $event.preventDefault()"
    [attr.aria-pressed]="selected()"
  >
    <div class="card-head">
      <div>
        <p class="card-title">{{ title() }}</p>
        <p class="card-subtitle">{{ subtitle() }}</p>
      </div>
      <span class="card-badge">{{ selected() ? 'Active' : 'Inspect' }}</span>
    </div>

    <div class="card-summary">
      <strong class="card-hero">{{ hero() }}</strong>
      <span class="card-delta">{{ delta() }}</span>
    </div>

    <div class="card-content">
      <ng-content />
    </div>
  </div>
</article>
