<section class="filter-bar" aria-label="Time range">
  <span class="filter-label">Time range</span>
  <div class="slider-block">
    <strong class="slider-value">{{ timeRanges[selectedIndex()].label }}</strong>

    <input
      class="slider"
      type="range"
      min="0"
      [max]="timeRanges.length - 1"
      step="1"
      [value]="selectedIndex()"
      (input)="onSliderChange(($any($event.target).value))"
      aria-label="Time range"
    />

    <div class="slider-labels" aria-hidden="true">
      @for (range of timeRanges; track range.value) {
        <span class="slider-label" [class.slider-label--active]="range.value === activeTimeRange()">
          {{ range.label }}
        </span>
      }
    </div>
  </div>
</section>
